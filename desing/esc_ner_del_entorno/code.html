<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 0.5px solid rgba(255, 255, 255, 0.3);
        }
        .scanner-frame {
            position: relative;
            width: 250px;
            height: 250px;
        }
        .scanner-frame::before, .scanner-frame::after, .scanner-frame > div::before, .scanner-frame > div::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: #00dce5;
            border-style: solid;
        }
        .scanner-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; }
        .scanner-frame::after { top: 0; right: 0; border-width: 3px 3px 0 0; }
        .scanner-frame > div::before { bottom: 0; left: 0; border-width: 0 0 3px 3px; }
        .scanner-frame > div::after { bottom: 0; right: 0; border-width: 0 3px 3px 0; }
        
        @keyframes scanline {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(250px); opacity: 0; }
        }
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: #00dce5;
            box-shadow: 0 0 8px #00dce5;
            animation: scanline 2s linear infinite;
        }
    </style>
</head>

</div>
<div>
